<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
<div class="body_off">
    <div class="screen" id="screen"></div>
    <div class="keyboards">
        <div class="row1">
            <button id="del">÷</button>
            <button id="one">1</button>
            <button id="four">4</button>
            <button id="seven">7</button>
            <button id="point">.</button>
        </div>
        <div class="row2">
            <button id="umn">×</button>
            <button id="tow">2</button>
            <button id="five">5</button>
            <button id="eight">8</button>
            <button id="zero">0</button>
        </div>
        <div class="row3">
            <button id="minus">-</button>
            <button id="three">3</button>
            <button id="six">6</button>
            <button id="nine">9</button>
            <button id=",">,</button>
        </div>
        <div class="row4">
            <button id="plus">+</button>
            <button id="off">O</button>
            <button id="cencal">C</button>
            <button id="result">=</button>
        </div>
    </div>
</div>


<style>
    .body_off {
        width: 15%;
        border: 2px solid #222;
        padding: 10px;
        background: #222;
    }
    .keyboards {
        display: flex;
        padding: 7px;
    }
    button {
        width: 50px;
        height: 50px;
        border: 2px solid #fff;
        color: #fff;
        background: transparent;
        font-size: 18px;
        margin-top: 3px;
        margin-left: 3px;
    }
    .screen {  
        width: 100%;
        height: 70px;
        color: #fff;
        background: #1b6a0347;
        text-align: right;
        font-size: 50px;
        display: flex;
        align-items: center;
        justify-content: end;
    }
    #result {
        height: 103px;
        margin-left: 3px;
        background: orange;
    }
    #cencal {
        background: #c50766;
    }
    .row1, .row2, .row3, .row4 {
        display: flex;
        flex-direction: column;
    }
</style>

<script>
    const screen = document.getElementById('screen')
    const one = document.getElementById('one')
    const two = document.getElementById('one')
    const three = document.getElementById('one')
    const four = document.getElementById('one')
    const five = document.getElementById('one')
    const six = document.getElementById('one')
    const seven = document.getElementById('one')
    const eight = document.getElementById('one')
    const nine = document.getElementById('one')
    const zero = document.getElementById('one')

</script>
    
</body>
</html>
